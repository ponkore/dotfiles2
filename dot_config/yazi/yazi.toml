[mgr]
show_hidden = true
linemode = "size_and_mtime"

[opener]
edit = [
    { run = "vim %s", desc = "vim", for = "windows", block = true },
    { run = "gvim %s", desc = "gvim", for = "windows", orphan = true },
    { run = "C:\\Progra~1\\Notepad++\\notepad++.exe %s", desc = "notepad++", for = "windows", block = true },
    { run = "vim '%s'", desc = "vim", for = "unix", block = true },
]
excel = [
    { run = 'start "" "%s"', desc = "Excel", for = "windows", orphan = true },
]
markdown = [
    { run = "marktext %s", desc = "marktext", for = "windows", orphan = true },
    { run = "zed %s", desc = "zed", for = "windows", orphan = true },
    { run = "code %s", desc = "vscode", for = "windows", orphan = true },
    { run = "open -a MarkText %s", desc = "marktext", for = "macos", orphan = true },
    { run = "zed %s", desc = "zed", for = "macos", orphan = true },
    { run = "code %s", desc = "vscode", for = "macos", orphan = true },
]

[[plugin.prepend_fetchers]]
id    = "git"
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
id    = "git"
url   = "*/"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
id    = "eol"
url   = "*"
run   = "eol"
group = "eol"

[open]
prepend_rules = [
    { url = "*.xls",  use = "excel" },
    { url = "*.xlsx", use = "excel" },
    { url = "*.xlsm", use = "excel" },
    { url = "*.md",       use = [ "edit", "markdown" ] },
    { url = "*.markdown", use = [ "edit", "markdown" ] },
]
